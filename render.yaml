# Render Blueprint — deploys frontend + backend from this monorepo
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API ──
  - type: web
    name: sa-church-finder-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma migrate deploy && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CLIENT_URL
        value: https://sachurchfinder.com,https://sa-church-finder.onrender.com
      - key: DATABASE_URL
        sync: false # Set manually to Supabase session pooler URL
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://sa-church-finder-api.onrender.com/api/v1/auth/google/callback
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
    healthCheckPath: /api/v1/health

  # ── Frontend SPA ──
  - type: web
    name: sa-church-finder
    runtime: static
    region: oregon
    plan: free
    domains:
      - sachurchfinder.com
      - www.sachurchfinder.com
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sa-church-finder-api.onrender.com
      - key: VITE_MAPBOX_TOKEN
        sync: false # Set manually in Render dashboard (public token, safe for client)
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_ENVIRONMENT
        value: production
    headers:
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self';
          script-src 'self' https://api.mapbox.com https://*.sentry.io blob:;
          style-src 'self' 'unsafe-inline' https://api.mapbox.com https://fonts.googleapis.com;
          font-src 'self' https://fonts.gstatic.com;
          img-src 'self' data: blob: https://api.mapbox.com https://*.mapbox.com;
          connect-src 'self' https://sa-church-finder-api.onrender.com https://api.mapbox.com https://*.mapbox.com https://*.tiles.mapbox.com https://events.mapbox.com https://*.sentry.io;
          worker-src 'self' blob:;
          child-src blob:;
          frame-ancestors 'none';
          base-uri 'self';
          form-action 'self'
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(self)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
