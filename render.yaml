# Render Blueprint — deploys frontend + backend from this monorepo
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API ──
  - type: web
    name: sa-church-finder-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma migrate deploy && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CLIENT_URL
        value: https://sa-church-finder.onrender.com
      - key: DATABASE_URL
        sync: false # Set manually to Supabase session pooler URL
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://sa-church-finder-api.onrender.com/api/v1/auth/google/callback
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
    healthCheckPath: /api/v1/health

  # ── Frontend SPA ──
  - type: web
    name: sa-church-finder
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sa-church-finder-api.onrender.com
      - key: VITE_MAPBOX_TOKEN
        sync: false # Set manually in Render dashboard (public token, safe for client)
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_ENVIRONMENT
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
